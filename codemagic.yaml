workflows:
  ionic-capacitor-ios:
    name: FinanceOS iOS
    max_build_duration: 120
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: AS400Publisher
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.financeos.app
      vars:
        XCODE_PROJECT: "App.xcodeproj"
        XCODE_SCHEME: "App"
      node: v18.17.0
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build web
        script: npm run build
      - name: Capacitor update
        script: |
          npx cap add ios || true
          npx cap sync ios
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build ipa
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme $XCODE_SCHEME
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - user@example.com
        notify:
          success: true
          failure: true
